    .gallery-card {
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);

    .gallery-card:hover {
      transform: translateY(-12px);

    }
  </style>
</head>
<body class="bg-slate-50">

  <!-- Navbar (same) -->

      <h1 class="text-3xl font-bold text-white tracking-tighter">
        Fiza<span class="text-[#4ECDC4]">Events</span>
      </h1>
      <div class="space-x-8 text-white/90 text-lg flex items-center">

        <a href="service.html" class="hover:text-[#4ECDC4] transition">Services</a>
        <div class="relative group">

              <a href="gallery3.html" class="block px-4 py-3 hover:bg-gray-100 rounded-2xl">Insurance CEE Expo</a>
              <div class="border-t my-2"></div>
              <a href="gallery.html" class="block px-4 py-3 hover:bg-gray-100 rounded-2xl font-medium">All Events Gallery</a>

          </div>
        </div>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <section class="relative h-screen flex items-center justify-center overflow-hidden">
    <video autoplay muted loop playsinline class="absolute inset-0 w-full h-full object-cover">
      <source src="InsuranceCEEExpo.mp4" type="video/mp4">
    </video>
    <div class="absolute inset-0 bg-gradient-to-b from-black/40 via-black/30 to-black/70"></div>
    <div class="relative z-10 text-center px-6">
      <h1 class="text-6xl md:text-7xl font-bold text-white mb-6">Banking CEE Expo</h1>
      <p class="text-2xl text-white/90">Memorable Moments Across the Years</p>
    </div>
  </section>

  <!-- Gallery by Year -->
  <section class="py-20 bg-gray-50">
    <div class="max-w-7xl mx-auto px-6 space-y-20">

      <!-- 2025 -->
      <div>
        <h2 onclick="toggleYear(this)" class="cursor-pointer flex items-center justify-between text-4xl font-bold text-[#0A2540] mb-8">
          <span>2025</span>
          <i class="fas fa-chevron-down transition-transform"></i>
        </h2>
        <div class="year-grid grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6"></div>
      </div>

      <!-- 2024 -->
      <div>
        <h2 onclick="toggleYear(this)" class="cursor-pointer flex items-center justify-between text-4xl font-bold text-[#0A2540] mb-8">
          <span>2024</span>
          <i class="fas fa-chevron-down transition-transform"></i>
        </h2>
        <div class="year-grid grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6"></div>
      </div>

      <!-- 2023 -->
      <div>
        <h2 onclick="toggleYear(this)" class="cursor-pointer flex items-center justify-between text-4xl font-bold text-[#0A2540] mb-8">
          <span>2023</span>
          <i class="fas fa-chevron-down transition-transform"></i>
        </h2>
        <div class="year-grid grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6"></div>
      </div>

      <!-- 2022 -->
      <div>
        <h2 onclick="toggleYear(this)" class="cursor-pointer flex items-center justify-between text-4xl font-bold text-[#0A2540] mb-8">
          <span>2022</span>
          <i class="fas fa-chevron-down transition-transform"></i>
        </h2>
        <div class="year-grid grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6"></div>
      </div>

    </div>
  </section>

  <!-- Professional Lightbox -->
  <div id="lightbox" class="hidden fixed inset-0 bg-black/90 z-[100] flex items-center justify-center">
    <div class="modal relative max-w-5xl w-full mx-4">
      <button onclick="closeLightbox()" class="absolute -top-4 -right-4 bg-white text-[#0A2540] w-12 h-12 rounded-full flex items-center justify-center shadow-xl hover:scale-110 z-30">
        <i class="fas fa-times text-xl"></i>
      </button>

      <button onclick="prevImage()" class="absolute left-6 top-1/2 -translate-y-1/2 bg-black/70 hover:bg-black/80 text-white w-16 h-16 rounded-2xl flex items-center justify-center shadow-2xl backdrop-blur-md transition-all hover:scale-110 z-20">
        <i class="fas fa-chevron-left text-3xl"></i>
      </button>

      <button onclick="nextImage()" class="absolute right-6 top-1/2 -translate-y-1/2 bg-black/70 hover:bg-black/80 text-white w-16 h-16 rounded-2xl flex items-center justify-center shadow-2xl backdrop-blur-md transition-all hover:scale-110 z-20">
        <i class="fas fa-chevron-right text-3xl"></i>
      </button>

      <img id="lightbox-image" src="" alt="" class="w-full rounded-3xl shadow-2xl max-h-[85vh] object-contain">

      <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/90 to-transparent p-8 rounded-b-3xl">
        <h3 id="lightbox-title" class="text-3xl font-bold text-white"></h3>
        <p id="lightbox-desc" class="text-white/80 text-lg"></p>
      </div>
    </div>
  </div>

  <script>
   const allPhotos = [
      
      { src: "1.jpg", title: "Banking CEE Expo 2025", desc: "Grand Opening Ceremony", category: "expo" },
      { src: "2.jpg", title: "Banking CEE Expo 2025", desc: "Keynote Session", category: "expo" },
      { src: "3.jpg", title: "Banking CEE Expo 2025", desc: "Exhibition Floor", category: "expo" },
      { src: "4.jpg", title: "Banking CEE Expo 2025", desc: "Networking Lounge", category: "expo" },
      { src: "5.jpg", title: "Banking CEE Expo 2025", desc: "Panel Discussion", category: "expo" },
      { src: "6.jpg", title: "Banking CEE Expo 2025", desc: "VIP Reception", category: "expo" },
      { src: "7.jpg", title: "Banking CEE Expo 2025", desc: "Sponsor Booths", category: "expo" },
      { src: "8.jpg", title: "Banking CEE Expo 2025", desc: "Interactive Sessions", category: "expo" },
      { src: "9.jpg", title: "Banking CEE Expo 2025", desc: "Award Ceremony", category: "expo" },
      { src: "10.jpg", title: "Banking CEE Expo 2025", desc: "Closing Gala Dinner", category: "expo" },

      { src: "bceeexpo1.jpg", title: "Banking CEE Expo 2024", desc: "Networking Moment", category: "banking" },
      { src: "bceeexpo2.jpg", title: "Banking CEE Expo 2024", desc: "Opening Keynote", category: "banking" },
      { src: "bceeexpo3.jpg", title: "Banking CEE Expo 2024", desc: "Workshop presentation", category: "banking" },
      { src: "bceeexpo4.jpg", title: "Banking CEE Expo 2024", desc: "Main Stage Session", category: "banking" },
      { src: "bceeexpo5.jpg", title: "Banking CEE Expo 2024", desc: "VIP Reception", category: "banking" },
      { src: "bceeexpo6.jpg", title: "Banking CEE Expo 2024", desc: "VIP Reception", category: "banking" },
      { src: "bceeexpo7.jpg", title: "Banking CEE Expo 2024", desc: "Gala Diner", category: "banking" },
      { src: "bceeexpo8.jpg", title: "Banking CEE Expo 2024", desc: "Informal discussion", category: "banking" },
      { src: "bceeexpo9.jpg", title: "Banking CEE Expo 2024", desc: "sponsor booth", category: "banking" },
      { src: "bceeexpo10.jpg", title: "Banking CEE Expo 2024", desc: "Networking", category: "banking" },


      { src: "bceeexpo2023.jpg", title: "Banking CEE Expo 2023", desc: "Group of Leader", category: "banking" },
      { src: "bceeexpo20231.jpg", title: "Banking CEE Expo 2023", desc: "Discussion Panel", category: "banking" },
      { src: "bceeexpo20232.jpg", title: "Banking CEE Expo 2023", desc: "Outstanding Speaker", category: "banking" },
      { src: "bceeexpo20233.jpg", title: "Banking CEE Expo 2023", desc: "Workshop Session", category: "banking" },
      { src: "bceeexpo20234.jpg", title: "Banking CEE Expo 2023", desc: "Shared Knowledge", category: "banking" },
      { src: "bceeexpo20235.jpg", title: "Banking CEE Expo 2023", desc: "Main Stage Session", category: "banking" },
      { src: "bceeexpo20236.jpg", title: "Banking CEE Expo 2023", desc: "Exhibition Area", category: "banking" },
      { src: "bceeexpo20237.jpg", title: "Banking CEE Expo 2023", desc: "Premium Welcoming", category: "banking" },
      { src: "bceeexpo20238.jpg", title: "Banking CEE Expo 2023", desc: "Professional Network", category: "banking" },
      { src: "bceeexpo20239.jpg", title: "Banking CEE Expo 2023", desc: "Professional Interaction", category: "banking" },
   
       // Banking CEE Expo 2022
      { src: "bceeexpo20229.jpg", title: "Banking CEE Expo 2022", desc: "Opening Ceremony", category: "banking" },
      { src: "bceeexpo2022.jpg", title: "Banking CEE Expo 2022", desc: "Discussion Panel", category: "banking" },
      { src: "bceeexpo20221.jpg", title: "Banking CEE Expo 2022", desc: "Sponsor Booth", category: "banking" },
      { src: "bceeexpo20222.jpg", title: "Banking CEE Expo 2022", desc: "Groupe Leader", category: "banking" },
      { src: "bceeexpo20223.jpg", title: "Banking CEE Expo 2022", desc: "Main Stage Session", category: "banking" },
      { src: "bceeexpo20224.jpg", title: "Banking CEE Expo 2022", desc: "Panel Discussion", category: "banking" },
      { src: "bceeexpo20225.jpg", title: "Banking CEE Expo 2022", desc: "Workshop Session", category: "banking" },
      { src: "bceeexpo20226.jpg", title: "Banking CEE Expo 2022", desc: "Professional Interaction", category: "banking" },
      { src: "bceeexpo20227.jpg", title: "Banking CEE Expo 2022", desc: "Group of Leader", category: "banking" },
      { src: "bceeexpo20228.jpg", title: "Banking CEE Expo 2022", desc: "Gold Speaker", category: "banking" },
      
    ];

    let currentPhotos = allPhotos;
    let currentIndex = 0;

    function createYearGallery(year, container) {
      const photosInYear = allPhotos.filter(p => p.title.includes(year));
      
      photosInYear.forEach((photo, index) => {
        const globalIndex = allPhotos.indexOf(photo);
        
        const card = document.createElement('div');
        card.className = `gallery-card group relative rounded-3xl overflow-hidden shadow-md cursor-pointer aspect-[4/3]`;
        card.innerHTML = `
          <img src="${photo.src}" alt="${photo.title}" loading="lazy"
               class="w-full h-full object-cover transition-all duration-500 group-hover:scale-110">
          <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-transparent opacity-0 group-hover:opacity-100 transition-all flex items-end p-6">
            <p class="text-white text-sm font-medium">${photo.desc}</p>
          </div>
        `;
        card.onclick = () => openLightbox(globalIndex);
        container.appendChild(card);
      });
    }

    function toggleYear(header) {
      const grid = header.parentElement.querySelector('.year-grid');
      const icon = header.querySelector('i');
      grid.classList.toggle('hidden');
      icon.classList.toggle('rotate-180');
    }

    function openLightbox(index) {
      currentIndex = index;
      const photo = allPhotos[index];
      document.getElementById('lightbox-image').src = photo.src;
      document.getElementById('lightbox-title').textContent = photo.title;
      document.getElementById('lightbox-desc').textContent = photo.desc;
      
      document.getElementById('lightbox').classList.remove('hidden');
      document.getElementById('lightbox').classList.add('flex');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      const lb = document.getElementById('lightbox');
      lb.classList.add('hidden');
      lb.classList.remove('flex');
      document.body.style.overflow = 'visible';
    }

    function prevImage() {
      currentIndex = (currentIndex - 1 + allPhotos.length) % allPhotos.length;
      openLightbox(currentIndex);
    }

    function nextImage() {
      currentIndex = (currentIndex + 1) % allPhotos.length;
      openLightbox(currentIndex);
    }

    // Keyboard support
    document.addEventListener('keydown', e => {
      if (document.getElementById('lightbox').classList.contains('hidden')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') prevImage();
      if (e.key === 'ArrowRight') nextImage();
    });

    document.getElementById('lightbox').addEventListener('click', (e) => {
      if (e.target.id === 'lightbox') closeLightbox();
    });

    // Initialize Galleries by Year
    function initGalleries() {
      const yearGrids = document.querySelectorAll('.year-grid');
      
      createYearGallery('2025', yearGrids[0]);
      createYearGallery('2024', yearGrids[1]);
      createYearGallery('2023', yearGrids[2]);
      createYearGallery('2022', yearGrids[3]);
    }

    initGalleries();
  </script>
</body>
</html>
