<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Insurance CEE Expo - Fiza Events</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .gallery-card {
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .gallery-card:hover {
      transform: translateY(-12px);
      box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25);
    }
  </style>
</head>
<body class="bg-slate-50">

  <!-- Navbar -->
  <nav class="bg-[#0A2540]/95 backdrop-blur-md shadow-xl sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
      <h1 class="text-3xl font-bold text-white tracking-tighter">
        Fiza<span class="text-[#4ECDC4]">Events</span>
      </h1>
      <div class="space-x-8 text-white/90 text-lg flex items-center">
        <a href="index.html" class="hover:text-[#4ECDC4] transition">Home</a>
        <a href="about.html" class="hover:text-[#4ECDC4] transition">About</a>
        <a href="service.html" class="hover:text-[#4ECDC4] transition">Services</a>
        <div class="relative group">
          <a href="#" class="text-[#4ECDC4] font-semibold flex items-center gap-1 hover:text-[#4ECDC4] transition">
            Gallery <i class="fas fa-chevron-down text-sm transition-transform group-hover:rotate-180"></i>
          </a>
          <div class="absolute hidden group-hover:block pt-3 z-[100] right-0">
            <div class="bg-white shadow-2xl rounded-3xl py-4 px-5 w-72 text-[#0A2540]">
              <a href="gallery1.html" class="block px-4 py-3 hover:bg-gray-100 rounded-2xl">Banking CEE Expo</a>
              <a href="gallery2.html" class="block px-4 py-3 hover:bg-gray-100 rounded-2xl">Digital Banking CEE Summit</a>
              <a href="gallery3.html" class="block px-4 py-3 hover:bg-gray-100 rounded-2xl">Insurance CEE Expo</a>
              <div class="border-t my-2"></div>
              <a href="gallery.html" class="block px-4 py-3 hover:bg-gray-100 rounded-2xl font-medium">All Events Gallery</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <section class="relative h-screen flex items-center justify-center overflow-hidden">
    <video autoplay muted loop playsinline class="absolute inset-0 w-full h-full object-cover">
      <source src="InsuranceCEEExpo.mp4" type="video/mp4">
    </video>
    <div class="absolute inset-0 bg-gradient-to-b from-black/40 via-black/30 to-black/70"></div>
    <div class="relative z-10 text-center px-6 max-w-5xl mx-auto">
      <h1 class="text-6xl md:text-7xl font-bold text-white mb-6 tracking-tight">
        Insurance CEE Expo
      </h1>
      <p class="text-2xl md:text-3xl text-white/90 max-w-2xl mx-auto">
        Leading Insurance Exhibition • Innovation • Leadership • Networking
      </p>
    </div>
  </section>

  <!-- Gallery by Year -->
  <section class="py-20 bg-gray-50">
    <div class="max-w-7xl mx-auto px-6 space-y-20">

      <!-- 2024 -->
      <div>
        <h2 onclick="toggleYear(this)" class="cursor-pointer flex items-center justify-between text-4xl font-bold text-[#0A2540] mb-8">
          <span>2024</span>
          <i class="fas fa-chevron-down transition-transform"></i>
        </h2>
        <div class="year-grid grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6"></div>
      </div>

      <!-- 2023 -->
      <div>
        <h2 onclick="toggleYear(this)" class="cursor-pointer flex items-center justify-between text-4xl font-bold text-[#0A2540] mb-8">
          <span>2023</span>
          <i class="fas fa-chevron-down transition-transform"></i>
        </h2>
        <div class="year-grid grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6"></div>
      </div>

    </div>
  </section>

  <!-- Professional Lightbox -->
  <div id="lightbox" class="hidden fixed inset-0 bg-black/90 z-[100] flex items-center justify-center">
    <div class="modal relative max-w-5xl w-full mx-4">
      <button onclick="closeLightbox()" class="absolute -top-4 -right-4 bg-white text-[#0A2540] w-12 h-12 rounded-full flex items-center justify-center shadow-xl hover:scale-110 z-30">
        <i class="fas fa-times text-xl"></i>
      </button>

      <button onclick="prevImage()" class="absolute left-6 top-1/2 -translate-y-1/2 bg-black/70 hover:bg-black/80 text-white w-16 h-16 rounded-2xl flex items-center justify-center shadow-2xl backdrop-blur-md transition-all hover:scale-110 z-20">
        <i class="fas fa-chevron-left text-3xl"></i>
      </button>

      <button onclick="nextImage()" class="absolute right-6 top-1/2 -translate-y-1/2 bg-black/70 hover:bg-black/80 text-white w-16 h-16 rounded-2xl flex items-center justify-center shadow-2xl backdrop-blur-md transition-all hover:scale-110 z-20">
        <i class="fas fa-chevron-right text-3xl"></i>
      </button>

      <img id="lightbox-image" src="" alt="" class="w-full rounded-3xl shadow-2xl max-h-[85vh] object-contain">

      <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/90 to-transparent p-8 rounded-b-3xl">
        <h3 id="lightbox-title" class="text-3xl font-bold text-white"></h3>
        <p id="lightbox-desc" class="text-white/80 text-lg"></p>
      </div>
    </div>
  </div>

  <script>
    const allPhotos = [
      // Insurance CEE Expo 2024
      { src: "insurance1.jpg", title: "Insurance CEE Expo 2024", desc: "Grand Opening Ceremony", year: 2024 },
      { src: "insurance2.jpg", title: "Insurance CEE Expo 2024", desc: "Networking Moment", year: 2024 },
      { src: "insurance3.jpg", title: "Insurance CEE Expo 2024", desc: "Gala Dinner", year: 2024 },
      { src: "insurance4.jpg", title: "Insurance CEE Expo 2024", desc: "Delegate Badges", year: 2024 },
      { src: "insurance5.jpg", title: "Insurance CEE Expo 2024", desc: "Professional Networking", year: 2024 },
      { src: "insurance6.jpg", title: "Insurance CEE Expo 2024", desc: "Keynote Presentation", year: 2024 },
      { src: "insurance7.jpg", title: "Insurance CEE Expo 2024", desc: "Dessert Station", year: 2024 },
      { src: "insurance8.jpg", title: "Insurance CEE Expo 2024", desc: "Panel Discussion", year: 2024 },
      { src: "insurance9.jpg", title: "Insurance CEE Expo 2024", desc: "Group of Leaders", year: 2024 },
      { src: "insurance10.jpg", title: "Insurance CEE Expo 2024", desc: "Informal Networking", year: 2024 },

      // Insurance CEE Expo 2023
      { src: "insurance2023.jpg", title: "Insurance CEE Expo 2023", desc: "Grand Welcoming", year: 2023 },
      { src: "insurance20231.jpg", title: "Insurance CEE Expo 2023", desc: "Networking Moment", year: 2023 },
      { src: "insurance20232.jpg", title: "Insurance CEE Expo 2023", desc: "Professional Workshop", year: 2023 },
      { src: "insurance20233.jpg", title: "Insurance CEE Expo 2023", desc: "Professional Panel Discussion", year: 2023 },
      { src: "insurance20234.jpg", title: "Insurance CEE Expo 2023", desc: "Professional Networking", year: 2023 },
      { src: "insurance20235.jpg", title: "Insurance CEE Expo 2023", desc: "Keynote Presentation", year: 2023 },
      { src: "insurance20236.jpg", title: "Insurance CEE Expo 2023", desc: "Sponsor Booth", year: 2023 },
      { src: "insurance20237.jpg", title: "Insurance CEE Expo 2023", desc: "Connectiva Members", year: 2023 },
      { src: "insurance20238.jpg", title: "Insurance CEE Expo 2023", desc: "Group of Leaders", year: 2023 },
      { src: "insurance20239.jpg", title: "Insurance CEE Expo 2023", desc: "Share Knowledge", year: 2023 }
    ];

    let currentIndex = 0;

    function createYearGallery(year, container) {
      const photosInYear = allPhotos.filter(p => p.year === year);

      photosInYear.forEach((photo, localIndex) => {
        const globalIndex = allPhotos.indexOf(photo);
        const card = document.createElement('div');
        card.className = `gallery-card group relative rounded-3xl overflow-hidden shadow-md cursor-pointer aspect-[4/3]`;
        card.innerHTML = `
          <img src="${photo.src}" alt="${photo.title}" loading="lazy"
               class="w-full h-full object-cover transition-all duration-500 group-hover:scale-110">
          <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-transparent opacity-0 group-hover:opacity-100 transition-all flex items-end p-6">
            <p class="text-white text-sm font-medium">${photo.desc}</p>
          </div>
        `;
        card.onclick = () => openLightbox(globalIndex);
        container.appendChild(card);
      });
    }

    function toggleYear(header) {
      const grid = header.parentElement.querySelector('.year-grid');
      const icon = header.querySelector('i');
      grid.classList.toggle('hidden');
      icon.classList.toggle('rotate-180');
    }

    function openLightbox(index) {
      currentIndex = index;
      const photo = allPhotos[index];
      document.getElementById('lightbox-image').src = photo.src;
      document.getElementById('lightbox-title').textContent = photo.title;
      document.getElementById('lightbox-desc').textContent = photo.desc;
      
      document.getElementById('lightbox').classList.remove('hidden');
      document.getElementById('lightbox').classList.add('flex');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      const lb = document.getElementById('lightbox');
      lb.classList.add('hidden');
      lb.classList.remove('flex');
      document.body.style.overflow = 'visible';
    }

    function prevImage() {
      currentIndex = (currentIndex - 1 + allPhotos.length) % allPhotos.length;
      openLightbox(currentIndex);
    }

    function nextImage() {
      currentIndex = (currentIndex + 1) % allPhotos.length;
      openLightbox(currentIndex);
    }

    document.addEventListener('keydown', e => {
      if (document.getElementById('lightbox').classList.contains('hidden')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') prevImage();
      if (e.key === 'ArrowRight') nextImage();
    });

    document.getElementById('lightbox').addEventListener('click', (e) => {
      if (e.target.id === 'lightbox') closeLightbox();
    });

    // Initialize
    function initGalleries() {
      const grids = document.querySelectorAll('.year-grid');
      createYearGallery(2024, grids[0]);
      createYearGallery(2023, grids[1]);
    }

    initGalleries();
  </script>
</body>
</html>
