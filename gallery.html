    let currentIndex = 0;
    let currentPhotos = allPhotos;

    function createGallery(photos) {
      currentPhotos = photos;
      const grid = document.getElementById('gallery-grid');
      grid.innerHTML = '';

      let currentEvent = '';
      
      photos.forEach((photo, index) => {
        // Add event title when the event changes
        if (photo.title !== currentEvent) {
          currentEvent = photo.title;
          
         const titleDiv = document.createElement('div');
            titleDiv.className = 'category-title';
            titleDiv.innerHTML = `<h3 class="text-3xl font-bold text-[#0A2540] border-b border-gray-200 pb-4">${photo.title}</h3>`;
            grid.appendChild(titleDiv);
        }

        const div = document.createElement('div');
        div.className = `gallery-card group relative rounded-3xl overflow-hidden shadow-md cursor-pointer aspect-[4/3]`;
        div.innerHTML = `
          <img src="${photo.src}" alt="${photo.title}" loading="lazy"
               class="w-full h-full object-cover transition-all duration-500 group-hover:scale-110">
          <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-transparent opacity-0 group-hover:opacity-100 transition-all flex items-end p-6">
            <p class="text-white text-sm font-medium">${photo.desc}</p>
          </div>
        `;
        div.onclick = () => openLightbox(index);
        grid.appendChild(div);
      });
    }

    function filterCategory(cat) {
     document.querySelectorAll('.filter-btn').forEach(btn => {
         const isActive = (cat === 'all' && btn.textContent === 'All') ||
                    btn.textContent.toLowerCase().includes(cat);

           btn.classList.toggle('active', isActive);
           btn.classList.toggle('bg-[#0A2540]', isActive);
           btn.classList.toggle('text-white', isActive);
    });

       currentPhotos = (cat === 'all') 
      ? allPhotos 
      : allPhotos.filter(p => p.category === cat);

       createGallery(currentPhotos);
}

    function openLightbox(index) {
      currentIndex = index;
      const photo = currentPhotos[index];
      document.getElementById('lightbox-image').src = photo.src;
      document.getElementById('lightbox-title').textContent = photo.title;
      document.getElementById('lightbox-desc').textContent = photo.desc;
      
      document.getElementById('lightbox').classList.remove('hidden');
      document.getElementById('lightbox').classList.add('flex');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      const lb = document.getElementById('lightbox');
      lb.classList.add('hidden');
      lb.classList.remove('flex');
      document.body.style.overflow = 'visible';
    }

    document.addEventListener('keydown', e => {
      if (document.getElementById('lightbox').classList.contains('hidden')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') prevImage();
      if (e.key === 'ArrowRight') nextImage();
    });

   function prevImage() {
      currentIndex = (currentIndex - 1 + currentPhotos.length) % currentPhotos.length;
      openLightbox(currentIndex);
    }
    function nextImage() {
      currentIndex = (currentIndex + 1) % currentPhotos.length;
      openLightbox(currentIndex);
    }

    document.getElementById('lightbox').addEventListener('click', (e) => {
      if (e.target.id === 'lightbox') closeLightbox();
    });

    // Initialize
    createGallery(allPhotos);
  </script>
