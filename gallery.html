<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Galleries - Fiza Events</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }

    .gallery-card {
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .gallery-card:hover {
      transform: translateY(-12px);
      box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25);
    }
  </style>
</head>
<body class="bg-slate-50">

  <!-- Navbar with Dropdown -->
  <nav class="bg-[#0A2540]/95 backdrop-blur-md shadow-xl sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
      <h1 class="text-3xl font-bold text-white tracking-tighter">
        Fiza<span class="text-[#4ECDC4]">Events</span>
      </h1>
      
      <div class="space-x-9 text-white/90 text-lg flex items-center">
        <a href="index.html" class="hover:text-[#4ECDC4] transition">Home</a>
        <a href="about.html" class="hover:text-[#4ECDC4] transition">About</a>
        <a href="service.html" class="hover:text-[#4ECDC4] transition">Services</a>
        
        <!-- Gallery Dropdown -->
        <div class="relative group">
          <a href="#" 
             class="text-[#4ECDC4] font-semibold flex items-center gap-1 hover:text-[#4ECDC4] transition">
            Gallery
            <i class="fas fa-chevron-down text-sm transition-transform group-hover:rotate-180"></i>
          </a>
          
          <div class="absolute hidden group-hover:block pt-3 z-[100] right-0">
            <div class="bg-white shadow-2xl rounded-3xl py-4 px-5 w-72 text-[#0A2540] text-base">
              <a href="gallery1.html" 
                 class="block px-4 py-3 hover:bg-gray-100 rounded-2xl transition flex items-center gap-3 text-sm">
                Banking CEE Expo
              </a>
              <a href="gallery2.html" 
                 class="block px-4 py-3 hover:bg-gray-100 rounded-2xl transition flex items-center gap-3 text-sm">
                Digital Banking CEE Summit
              </a>
              <a href="gallery3.html" 
                 class="block px-4 py-3 hover:bg-gray-100 rounded-2xl transition flex items-center gap-3 text-sm">
                Insurance CEE Expo
              </a>
              <div class="border-t my-2"></div>
              <a href="gallery.html" 
                 class="block px-4 py-3 hover:bg-gray-100 rounded-2xl transition flex items-center gap-3 text-sm font-medium">
                All Events Gallery
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <section class="bg-[#0A2540] text-white py-24">
    <div class="max-w-7xl mx-auto px-6 text-center">
      <h1 class="text-5xl md:text-6xl font-bold mb-6">All Moments</h1>
      <p class="text-xl text-white/80">Banking • Digital Banking • Insurance Events 2025</p>
    </div>
  </section>

  <!-- Unified Gallery -->
  <section class="py-20 bg-gray-50">
    <div class="max-w-7xl mx-auto px-6">
      <div class="flex justify-between items-center mb-10">
        <h2 class="text-4xl font-bold text-[#0A2540]">All Event Photos</h2>
        
        <div class="flex gap-3">
          <button onclick="filterCategory('all')" class="filter-btn active px-6 py-3 rounded-2xl text-sm font-medium bg-[#0A2540] text-white">All</button>
          <button onclick="filterCategory('banking')" class="filter-btn px-6 py-3 rounded-2xl text-sm font-medium border border-gray-200 hover:bg-white">Banking Expo</button>
          <button onclick="filterCategory('digital')" class="filter-btn px-6 py-3 rounded-2xl text-sm font-medium border border-gray-200 hover:bg-white">Digital Summit</button>
          <button onclick="filterCategory('insurance')" class="filter-btn px-6 py-3 rounded-2xl text-sm font-medium border border-gray-200 hover:bg-white">Insurance Expo</button>
        </div>
      </div>

      <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6" id="gallery-grid"></div>
    </div>
  </section>

  <!-- Lightbox -->
  <div id="lightbox" class="hidden fixed inset-0 bg-black/90 z-[100] flex items-center justify-center">
    <div class="relative max-w-5xl w-full mx-4">
      <button onclick="closeLightbox()" class="absolute -top-4 -right-4 bg-white text-[#0A2540] w-12 h-12 rounded-full flex items-center justify-center shadow-xl hover:scale-110 z-10">
        <i class="fas fa-times text-xl"></i>
      </button>
      
      <img id="lightbox-image" src="" alt="" class="w-full rounded-3xl shadow-2xl max-h-[85vh] object-contain">
      
      <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/90 to-transparent p-8 rounded-b-3xl">
        <h3 id="lightbox-title" class="text-3xl font-bold text-white"></h3>
        <p id="lightbox-desc" class="text-white/80 text-lg"></p>
      </div>
    </div>
  </div>

  <script>
    const allPhotos = [
      // Banking CEE Expo
      { src: "1.jpg", title: "Banking CEE Expo 2025", desc: "Grand Opening Ceremony", category: "banking" },
      { src: "2.jpg", title: "Banking CEE Expo 2025", desc: "Keynote Session", category: "banking" },
      { src: "3.jpg", title: "Banking CEE Expo 2025", desc: "Exhibition Floor", category: "banking" },
      { src: "4.jpg", title: "Banking CEE Expo 2025", desc: "Networking Lounge", category: "banking" },
      { src: "5.jpg", title: "Banking CEE Expo 2025", desc: "Panel Discussion", category: "banking" },
      { src: "6.jpg", title: "Banking CEE Expo 2025", desc: "VIP Reception", category: "banking" },
      { src: "7.jpg", title: "Banking CEE Expo 2025", desc: "Sponsor Booths", category: "banking" },
      { src: "8.jpg", title: "Banking CEE Expo 2025", desc: "Interactive Sessions", category: "banking" },
      { src: "9.jpg", title: "Banking CEE Expo 2025", desc: "Award Ceremony", category: "banking" },
      { src: "10.jpg", title: "Banking CEE Expo 2025", desc: "Closing Gala Dinner", category: "banking" },

      // Digital Banking CEE Summit
      { src: "BankingCEESum1.jpg", title: "Digital Banking CEE Summit 2025", desc: "Opening Keynote", category: "digital" },
      { src: "BankingCEESum2.jpg", title: "Digital Banking CEE Summit 2025", desc: "Fintech Innovation Showcase", category: "digital" },
      { src: "BankingCEESum3.jpg", title: "Digital Banking CEE Summit 2025", desc: "Main Stage Session", category: "digital" },
      { src: "BankingCEESum4.jpg", title: "Digital Banking CEE Summit 2025", desc: "Panel Discussion", category: "digital" },
      { src: "BankingCEESum5.jpg", title: "Digital Banking CEE Summit 2025", desc: "Networking Break", category: "digital" },
      { src: "BankingCEESum6.jpg", title: "Digital Banking CEE Summit 2025", desc: "Exhibition Area", category: "digital" },
      { src: "BankingCEESum7.jpg", title: "Digital Banking CEE Summit 2025", desc: "AI in Banking Presentation", category: "digital" },
      { src: "BankingCEESum8.jpg", title: "Digital Banking CEE Summit 2025", desc: "Interactive Workshop", category: "digital" },
      { src: "BankingCEESum9.jpg", title: "Digital Banking CEE Summit 2025", desc: "Award Ceremony", category: "digital" },
      { src: "BankingCEESum10.jpg", title: "Digital Banking CEE Summit 2025", desc: "Closing Gala", category: "digital" },

      // Insurance CEE Expo
      { src: "insurance1.jpg", title: "Insurance CEE Expo 2025", desc: "Grand Opening Ceremony", category: "insurance" },
      { src: "insurance2.jpg", title: "Insurance CEE Expo 2025", desc: "Networking Moment", category: "insurance" },
      { src: "insurance3.jpg", title: "Insurance CEE Expo 2025", desc: "Gala Dinner", category: "insurance" },
      { src: "insurance4.jpg", title: "Insurance CEE Expo 2025", desc: "Delegate Badges", category: "insurance" },
      { src: "insurance5.jpg", title: "Insurance CEE Expo 2025", desc: "Professional Networking", category: "insurance" },
      { src: "insurance6.jpg", title: "Insurance CEE Expo 2025", desc: "Keynote Presentation", category: "insurance" },
      { src: "insurance7.jpg", title: "Insurance CEE Expo 2025", desc: "Dessert Station", category: "insurance" },
      { src: "insurance8.jpg", title: "Insurance CEE Expo 2025", desc: "Panel Discussion", category: "insurance" },
      { src: "insurance9.jpg", title: "Insurance CEE Expo 2025", desc: "Group of Leaders", category: "insurance" },
      { src: "insurance10.jpg", title: "Insurance CEE Expo 2025", desc: "Informal Networking", category: "insurance" }
    ];

    let currentIndex = 0;

    function createGallery(filteredPhotos) {
      const grid = document.getElementById('gallery-grid');
      grid.innerHTML = '';

      filteredPhotos.forEach((photo, index) => {
        const div = document.createElement('div');
        div.className = `gallery-card group relative rounded-3xl overflow-hidden shadow-md cursor-pointer aspect-[4/3]`;
        div.innerHTML = `
          <img src="${photo.src}" alt="${photo.title}" loading="lazy"
               class="w-full h-full object-cover transition-all duration-500 group-hover:scale-110">
          <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-transparent opacity-0 group-hover:opacity-100 transition-all flex items-end p-6">
            <p class="text-white text-sm font-medium">${photo.desc}</p>
          </div>
        `;
        div.onclick = () => openLightbox(index);
        grid.appendChild(div);
      });
    }

    function filterCategory(cat) {
      document.querySelectorAll('.filter-btn').forEach(btn => {
        const isActive = (cat === 'all' && btn.textContent === 'All') || 
                        btn.textContent.toLowerCase().includes(cat);
        btn.classList.toggle('active', isActive);
        btn.classList.toggle('bg-[#0A2540]', isActive);
        btn.classList.toggle('text-white', isActive);
      });

      const filtered = cat === 'all' ? allPhotos : allPhotos.filter(p => p.category === cat);
      createGallery(filtered);
    }

    function openLightbox(index) {
      currentIndex = index;
      const photo = allPhotos[index];
      document.getElementById('lightbox-image').src = photo.src;
      document.getElementById('lightbox-title').textContent = photo.title;
      document.getElementById('lightbox-desc').textContent = photo.desc;
      
      document.getElementById('lightbox').classList.remove('hidden');
      document.getElementById('lightbox').classList.add('flex');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      const lb = document.getElementById('lightbox');
      lb.classList.add('hidden');
      lb.classList.remove('flex');
      document.body.style.overflow = 'visible';
    }

    function prevImage() {
      currentIndex = (currentIndex - 1 + allPhotos.length) % allPhotos.length;
      openLightbox(currentIndex);
    }

    function nextImage() {
      currentIndex = (currentIndex + 1) % allPhotos.length;
      openLightbox(currentIndex);
    }

    // Keyboard support
    document.addEventListener('keydown', e => {
      if (document.getElementById('lightbox').classList.contains('hidden')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') prevImage();
      if (e.key === 'ArrowRight') nextImage();
    });

    document.getElementById('lightbox').addEventListener('click', (e) => {
      if (e.target.id === 'lightbox') closeLightbox();
    });

    // Initialize
    createGallery(allPhotos);
  </script>
</body>
</html>
